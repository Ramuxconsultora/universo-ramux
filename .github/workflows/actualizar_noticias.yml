name: Scraper de Noticias

on:
  schedule:
    # Se ejecuta a las 11:00, 16:00 y 00:00 UTC
    - cron: '0 11,16,0 * * *'
  workflow_dispatch: 

# Permisos necesarios para el entorno de GitHub
permissions:
  contents: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install feedparser requests supabase beautifulsoup4 lxml python-dotenv

    - name: Ejecutar el Scraper
      env:
        # Mapeamos los Secrets de GitHub a las variables que espera el script de Python
        VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        VITE_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.VITE_SUPABASE_SERVICE_ROLE_KEY }}
        VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      run: |
        # Entramos a la carpeta del scraper y ejecutamos
        cd modern-dashboard/backend-scraper
        python scraper.py
