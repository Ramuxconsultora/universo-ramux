name: Scraper de Noticias

on:
  schedule:
    # Se ejecuta cada 12 horas (00:00 y 12:00 UTC)
    - cron: '0 */12 * * *'
  workflow_dispatch: 

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install feedparser requests supabase beautifulsoup4 lxml

    - name: Ejecutar el Scraper
      env:
        # Mapeamos tus secretos de GitHub a las variables que lee el script de Python
        VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      run: |
        cd modern-dashboard/backend-scraper
        python scraper.py
