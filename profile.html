<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - RAMUX</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    colors: {
                        ramux: '#0ea5e9',
                        ramuxvis: '#8b5cf6',
                        brand: '#F76B1C',
                        dark: '#020617',
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.6s ease-out forwards',
                        'bounce-slow': 'bounce 2s infinite',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #020617;
            color: #f1f5f9;
        }

        .fixed-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at top left, #1e1b4b 0%, #0f172a 50%, #020617 100%);
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(14, 165, 233, 0.2);
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .avatar-option {
            transition: all 0.2s ease;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .avatar-option:hover {
            transform: scale(1.1);
            border-color: rgba(14, 165, 233, 0.5);
        }

        .avatar-option.selected {
            border-color: #F76B1C;
            box-shadow: 0 0 15px rgba(247, 107, 28, 0.4);
            background: rgba(247, 107, 28, 0.1);
        }
    </style>
</head>

<body class="antialiased min-h-screen flex flex-col items-center py-10 px-4">

    <div class="fixed-background"></div>

    <!-- Navigation -->
    <nav class="w-full max-w-4xl mb-8 flex justify-between items-center">
        <a href="dashboard.html" class="flex items-center gap-2 text-slate-400 hover:text-white transition-colors">
            <i class="fas fa-arrow-left"></i> Volver al Inicio
        </a>
        <div class="flex items-center gap-2">
            <span class="font-black text-2xl tracking-wide">MI PERFIL</span>
            <span class="w-2 h-2 rounded-full bg-brand animate-pulse"></span>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="w-full max-w-4xl space-y-8 animate-fade-in">

        <!-- Identity Card -->
        <div class="glass-panel p-8 md:p-12 rounded-3xl relative overflow-hidden">
            <div
                class="absolute top-0 right-0 w-64 h-64 bg-ramux/10 rounded-full blur-3xl -translate-y-1/2 translate-x-1/2">
            </div>

            <div class="relative z-10 flex flex-col md:flex-row items-center gap-8 md:gap-12">
                <!-- Avatar Section -->
                <div class="flex flex-col items-center">
                    <div id="current-avatar-display"
                        class="w-32 h-32 md:w-40 md:h-40 rounded-full bg-gradient-to-br from-slate-800 to-slate-900 border-4 border-ramux flex items-center justify-center text-6xl shadow-2xl relative group">
                        <i id="avatar-icon" class="fas fa-user-astronaut text-slate-300"></i>
                        <div class="absolute inset-0 bg-black/50 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity cursor-pointer"
                            onclick="document.getElementById('avatar-selector').scrollIntoView({behavior: 'smooth'})">
                            <i class="fas fa-camera text-white text-xl"></i>
                        </div>
                    </div>
                    <span
                        class="mt-4 text-xs font-bold text-ramux uppercase tracking-widest bg-ramux/10 px-3 py-1 rounded-full border border-ramux/20">Aspirante
                        Idóneo</span>
                </div>

                <!-- Info Section -->
                <div class="flex-1 text-center md:text-left w-full">
                    <label class="block text-xs uppercase text-slate-500 font-bold mb-1 tracking-wider">Nombre de
                        Usuario</label>
                    <div class="flex items-center gap-3 mb-6 justify-center md:justify-start">
                        <input type="text" id="profile-name"
                            class="bg-transparent text-3xl md:text-4xl font-black text-white border-b-2 border-transparent hover:border-slate-700 focus:border-ramux outline-none w-full max-w-md transition-colors text-center md:text-left"
                            value="Usuario">
                        <button onclick="saveProfile()" class="text-slate-500 hover:text-ramux" title="Guardar"><i
                                class="fas fa-save text-xl"></i></button>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-slate-900/50 p-4 rounded-xl border border-slate-700">
                            <span class="text-slate-400 text-xs font-bold uppercase block mb-1">Nivel Actual</span>
                            <span id="stat-level" class="text-2xl font-black text-brand">1</span>
                        </div>
                        <div class="bg-slate-900/50 p-4 rounded-xl border border-slate-700">
                            <span class="text-slate-400 text-xs font-bold uppercase block mb-1">Experiencia (XP)</span>
                            <span id="stat-xp" class="text-2xl font-black text-emerald-400">0</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Avatar Selector -->
        <div id="avatar-selector" class="glass-panel p-8 rounded-3xl">
            <h3 class="text-xl font-bold text-white mb-6 flex items-center gap-2">
                <i class="fas fa-mask text-ramux"></i> Personalizar Avatar
            </h3>
            <div class="grid grid-cols-4 md:grid-cols-8 gap-4">
                <!-- Avatar Options generated by JS -->
            </div>
        </div>

        <!-- Danger Zone -->
        <div class="border border-red-900/30 bg-red-900/5 p-6 rounded-2xl flex justify-between items-center">
            <div>
                <h4 class="text-red-400 font-bold">Cerrar Sesión</h4>
                <p class="text-xs text-red-300/60">Finaliza tu sesión actual en este dispositivo.</p>
            </div>
            <button onclick="logout()"
                class="px-6 py-2 bg-red-900/20 hover:bg-red-900/40 text-red-400 border border-red-900/50 rounded-lg font-bold transition-all text-sm">
                Salir
            </button>
        </div>

    </main>

    <script>
        // === AVATAR LIST ===
        const AVATARS = [
            { id: 'astro', icon: 'fa-user-astronaut' },
            { id: 'secret', icon: 'fa-user-secret' },
            { id: 'ninja', icon: 'fa-user-ninja' },
            { id: 'grad', icon: 'fa-user-graduate' },
            { id: 'tie', icon: 'fa-user-tie' },
            { id: 'robot', icon: 'fa-robot' },
            { id: 'dragon', icon: 'fa-dragon' },
            { id: 'chart', icon: 'fa-chart-line' },
        ];

        document.addEventListener('DOMContentLoaded', () => {
            loadProfile();
            renderAvatars();
        });

        function loadProfile() {
            // 1. Load Name
            const name = localStorage.getItem('cnv_user_name') || 'Usuario';
            document.getElementById('profile-name').value = name;

            // 2. Load Stats
            const savedGame = localStorage.getItem('cnv_m1_gamestate');
            if (savedGame) {
                const gameData = JSON.parse(savedGame);
                document.getElementById('stat-level').innerText = gameData.currentLevel || 1;
                document.getElementById('stat-xp').innerText = gameData.xp || 0;
            }

            // 3. Load Avatar
            const savedAvatar = localStorage.getItem('cnv_user_avatar') || 'astro';
            selectAvatar(savedAvatar, false);
        }

        function renderAvatars() {
            const container = document.querySelector('#avatar-selector .grid');
            container.innerHTML = AVATARS.map(av => `
                <div class="avatar-option w-16 h-16 rounded-xl bg-slate-800 flex items-center justify-center text-2xl text-slate-400" 
                     onclick="selectAvatar('${av.id}')"
                     id="opt-${av.id}">
                    <i class="fas ${av.icon}"></i>
                </div>
            `).join('');

            // Highlight current
            const current = localStorage.getItem('cnv_user_avatar') || 'astro';
            const el = document.getElementById(`opt-${current}`);
            if (el) el.classList.add('selected');
        }

        function selectAvatar(id, save = true) {
            // Update UI
            document.querySelectorAll('.avatar-option').forEach(el => el.classList.remove('selected', 'text-brand', 'bg-brand/10'));

            const target = document.getElementById(`opt-${id}`);
            if (target) {
                target.classList.add('selected');
                target.querySelector('i').classList.add('text-brand');
            }

            // Update Header Display
            const avatarParams = AVATARS.find(a => a.id === id) || AVATARS[0];
            const displayIcon = document.getElementById('avatar-icon');
            displayIcon.className = `fas ${avatarParams.icon} text-slate-100`;

            // Save to Storage
            if (save) {
                localStorage.setItem('cnv_user_avatar', id);
            }
        }

        function saveProfile() {
            const newName = document.getElementById('profile-name').value;
            if (newName.trim()) {
                localStorage.setItem('cnv_user_name', newName);
                showToast('Perfil actualizado correctamente');
            }
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'fixed bottom-8 right-8 bg-emerald-600 text-white px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3 animate-fade-in z-50 font-bold border border-emerald-400';
            toast.innerHTML = `<i class="fas fa-check-circle text-lg"></i> ${msg}`;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.transition = 'all 0.5s ease';
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(10px)';
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }

        function logout() {
            localStorage.removeItem('cnv_user_name');
            localStorage.removeItem('cnv_auth');
            window.location.href = 'index.html';
        }

        // === SOCIAL LOGIC ===

        // Privacy Toggle Listener
        const privacyToggle = document.getElementById('post-private');
        if (privacyToggle) {
            privacyToggle.addEventListener('change', (e) => {
                const label = document.getElementById('privacy-label');
                label.innerText = e.target.checked ? 'Privado 🔒' : 'Público 🌍';
                label.className = e.target.checked ? 'text-xs text-amber-400 font-bold transition-colors' : 'text-xs text-slate-400 group-hover:text-white transition-colors';
            });
        }

        function loadPosts() {
            const posts = JSON.parse(localStorage.getItem('ramux_posts') || '[]');
            const container = document.getElementById('user-feed');

            if (posts.length === 0) {
                container.innerHTML = '<div class="text-center py-8 text-slate-500 italic">No has publicado nada aún.</div>';
                return;
            }

            container.innerHTML = posts.map(post => `
                <div class="bg-slate-800/30 border border-slate-700/50 p-4 rounded-xl animate-fade-in relative group">
                    <div class="flex justify-between items-start mb-2">
                        <div class="flex items-center gap-2">
                             <span class="text-[10px] ${post.private ? 'bg-amber-500/10 text-amber-500 border-amber-500/30' : 'bg-blue-500/10 text-blue-400 border-blue-500/30'} px-2 py-0.5 rounded border font-bold uppercase">
                                ${post.private ? 'Privado' : 'Público'}
                            </span>
                            <span class="text-xs text-slate-500">${new Date(post.timestamp).toLocaleString()}</span>
                        </div>
                        <button onclick="deletePost('${post.id}')" class="text-slate-600 hover:text-red-400 transition-colors opacity-0 group-hover:opacity-100">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>
                    <p class="text-slate-200 text-sm leading-relaxed">${post.content}</p>
                </div>
            `).join('');

            // Update Social Score based on post count (simple mock logic)
            const score = posts.length * 15;
            document.getElementById('stat-social').innerText = score;
            localStorage.setItem('ramux_social_score', score);
        }

        function createPost() {
            const content = document.getElementById('post-content').value;
            const isPrivate = document.getElementById('post-private').checked;

            if (!content.trim()) return;

            const newPost = {
                id: Date.now().toString(),
                content: content,
                private: isPrivate,
                timestamp: Date.now(),
                likes: 0
            };

            const posts = JSON.parse(localStorage.getItem('ramux_posts') || '[]');
            posts.unshift(newPost); // Add to top
            localStorage.setItem('ramux_posts', JSON.stringify(posts));

            document.getElementById('post-content').value = ''; // clear
            loadPosts();
            showToast('Publicación creada');
        }

        function deletePost(id) {
            if (!confirm('¿Eliminar publicación?')) return;
            let posts = JSON.parse(localStorage.getItem('ramux_posts') || '[]');
            posts = posts.filter(p => p.id !== id);
            localStorage.setItem('ramux_posts', JSON.stringify(posts));
            loadPosts();
        }

        // Create initial load hook
        const originalLoadProfile = loadProfile;
        loadProfile = function () {
            originalLoadProfile(); // call original
            loadPosts(); // call new
        }
    </script>
</body>

</html>
